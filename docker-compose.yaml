version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tgfin-postgres
    environment:
      POSTGRES_DB: tgfin_bot
      POSTGRES_USER: tgfin_user
      POSTGRES_PASSWORD: tgfin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgfin_user -d tgfin_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: tgfin-bot
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
